async function dbSave(payload) {
  const r = await fetch(SUPA_URL+"/rest/v1/orders",{method:"POST",headers:{...HDR,"Prefer":"return=minimal"},body:JSON.stringify(payload)});
  if(!r.ok) throw new Error("HTTP "+r.status+": "+await r.text());
  return true;
}
async function dbFetch(fromISO) {
  let url = SUPA_URL+"/rest/v1/orders?select=*&order=created_at.desc&limit=500";
  if(fromISO) url += "&created_at=gte."+encodeURIComponent(fromISO);
  const r = await fetch(url,{headers:HDR});
  if(!r.ok) throw new Error("HTTP "+r.status+": "+await r.text());
  return r.json();
}

// ── HELPERS ───────────────────────────────────────────────
const hasV   = i => i.v && i.v.length > 0;
const rm     = n => "RM"+(+(n||0)).toFixed(2);
function defSel(item){const s={};(item.v||[]).forEach(vg=>{s[vg.key]=0;});return s;}
function iPrice(item,sel){
  let base=item.price||0;
  (item.v||[]).forEach(vg=>{
    const opt=vg.options[(sel&&sel[vg.key])||0];
    if(!opt)return;
    if(opt.base!==undefined)base=opt.base;else base+=opt.mod||0;
  });
  return base;
}
function iLabel(item,sel){
  return(item.v||[]).map(vg=>{
    const opt=vg.options[(sel&&sel[vg.key])||0];
    return opt?opt.label.replace(/ \(\+RM\d+\)/,""):"";
  }).filter(Boolean).join(" · ");
}
function sumOrder(ois){return(ois||[]).reduce((s,oi)=>s+iPrice(oi.item,oi.sel),0);}
function billGroups(ois){
  const simple=[],complex=[],map={};
  (ois||[]).forEach(oi=>{
    if(!hasV(oi.item)){
      if(!map[oi.item.id]){map[oi.item.id]={oi,qty:0};simple.push(map[oi.item.id]);}
      map[oi.item.id].qty++;
    }else complex.push(oi);
  });
  return{simple,complex};
}
function rangeFrom(r){
  if(r==="all")return null;
  const d=new Date();
  if(r==="today")d.setHours(0,0,0,0);
  else if(r==="week")d.setDate(d.getDate()-7);
  else if(r==="month")d.setDate(d.getDate()-30);
  return d.toISOString();
}

// ── CHIP ──────────────────────────────────────────────────
function Chip({table,status,pax,leader,total,isSource,combineMode,onPress}){
  const dot=status==="occupied"?C.red:status==="grouped"?C.blue:C.green;
  const bdr=isSource?C.gold:combineMode?C.blue+"66":status==="occupied"?"#5a1a1a":status==="grouped"?"#1a2a5a":C.bdr;
  const bg=isSource?"#221e0a":status==="occupied"?"#1e0c0c":status==="grouped"?"#0c1628":C.surfUp;
  const rnd=table.type!=="sq",big=table.type==="rnd-B",sml=table.type==="rnd-S";
  const w=big?68:sml?50:rnd?58:52;
  return(
    <button onClick={onPress} style={{width:w,height:w,borderRadius:rnd?"50%":9,background:bg,border:`2px solid ${bdr}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",gap:1,flexShrink:0,transition:"all 0.12s",boxShadow:isSource?`0 0 14px ${C.gold}66`:"none"}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:dot,boxShadow:`0 0 6px ${dot}`,marginBottom:1}}/>
      <div style={{fontSize:big?12:11,fontWeight:"bold",color:C.txt,lineHeight:1}}>{table.label}</div>
      <div style={{fontSize:9,color:C.dim,lineHeight:1}}>{table.seats}px</div>
      {pax>0&&<div style={{fontSize:9,color:dot,lineHeight:1}}>👤{pax}</div>}
      {leader&&total>0&&<div style={{position:"absolute",top:-7,right:-4,background:C.gold,color:"#0d0d0d",fontSize:8,fontWeight:"bold",padding:"2px 5px",borderRadius:8}}>{rm(total)}</div>}
    </button>
  );
}

// ── APP ───────────────────────────────────────────────────
function App(){
  const [groups,    setGroups]    = useState({});
  const [tGroup,    setTGroup]    = useState({});
  const [combMode,  setCombMode]  = useState(false);
  const [combSrc,   setCombSrc]   = useState(null);
  const [activeGid, setActiveGid] = useState(null);
  const [view,      setView]      = useState("floor");
  const [menuCat,   setMenuCat]   = useState(ALL_CATS[0]);
  const [saving,    setSaving]    = useState(false);
  const [toast,     setToast]     = useState(null);
  const [saveErr,   setSaveErr]   = useState(null);

  function showToast(msg,ok){setToast({msg,ok});setTimeout(()=>setToast(null),4000);}
  const gid_   = tid => tGroup[tid]||tid;
  const gdata_ = gid => groups[gid]||{tableIds:[gid],pax:0,ois:[]};
  const gtbls_ = gid => groups[gid]?groups[gid].tableIds:[gid];
  function tStatus(tid){
    const gd=gdata_(gid_(tid));
    if(gd.pax>0)return"occupied";
    if(tGroup[tid]||groups[gid_(tid)])return"grouped";
    return"available";
  }
  function startComb(){setCombMode(true);setCombSrc(null);}
  function cancelComb(){setCombMode(false);setCombSrc(null);}
  function onCombTap(tid){
    if(!combSrc){setCombSrc(tid);return;}
    if(combSrc===tid){setCombSrc(null);return;}
    const sg=gid_(combSrc),dg=gid_(tid);
    if(sg===dg){cancelComb();return;}
    const nid="G"+Date.now();
    const all=[...new Set([...gtbls_(sg),...gtbls_(dg)])];
    const ois=[...(gdata_(sg).ois||[]),...(gdata_(dg).ois||[])];
    setGroups(p=>{const n={...p};delete n[sg];delete n[dg];n[nid]={tableIds:all,pax:0,ois};return n;});
    setTGroup(p=>{const n={...p};all.forEach(id=>{n[id]=nid;});return n;});
    cancelComb();
  }
  function ungroup(gid){
    const g=groups[gid];if(!g)return;
    setGroups(p=>{const n={...p};delete n[gid];return n;});
    setTGroup(p=>{const n={...p};g.tableIds.forEach(id=>delete n[id]);return n;});
  }
  function openTable(tid){
    if(combMode){onCombTap(tid);return;}
    const gid=gid_(tid),gd=gdata_(gid);
    setActiveGid(gid);
    if(gd.pax===0)setView("pax");
    else{setView("order");setMenuCat(ALL_CATS[0]);}
  }
  function confirmPax(n){
    setGroups(p=>{const ex=p[activeGid]||{tableIds:[activeGid],ois:[]};return{...p,[activeGid]:{...ex,pax:n}};});
    setView("order");setMenuCat(ALL_CATS[0]);
  }
  function addItem(item){
    const inst={id:Date.now()+"_"+Math.random(),item,sel:defSel(item)};
    setGroups(p=>{const gd=p[activeGid]||{tableIds:[activeGid],pax:0,ois:[]};return{...p,[activeGid]:{...gd,ois:[...gd.ois,inst]}};});
  }
  function removeItem(itemId){
    setGroups(p=>{
      const gd=p[activeGid];if(!gd)return p;
      const ois=[...gd.ois];
      let found=-1;for(let i=ois.length-1;i>=0;i--){if(ois[i].item.id===itemId){found=i;break;}}
      if(found===-1)return p;
      ois.splice(found,1);
      return{...p,[activeGid]:{...gd,ois}};
    });
  }
  function updateVar(instId,vKey,oIdx){
    setGroups(p=>{
      const gd=p[activeGid];if(!gd)return p;
      return{...p,[activeGid]:{...gd,ois:gd.ois.map(oi=>oi.id===instId?{...oi,sel:{...oi.sel,[vKey]:oIdx}}:oi)}};
    });
  }
  async function closeTable(){
    const gd=gdata_(activeGid);
    const sub=sumOrder(gd.ois),tax=sub*TAX;
    const items=(gd.ois||[]).map(oi=>({name:oi.item.name,zh:oi.item.zh,emoji:oi.item.emoji,price:iPrice(oi.item,oi.sel),custom:iLabel(oi.item,oi.sel)||null,cat:ALL_CATS.find(c=>MENU[c].some(m=>m.id===oi.item.id))||""}));
    setSaving(true);setSaveErr(null);
    try{
      await dbSave({table_ids:gd.tableIds.join(", "),pax:gd.pax,items,subtotal:+sub.toFixed(2),tax:+tax.toFixed(2),total:+(sub+tax).toFixed(2)});
      showToast("✓ Saved to database",true);
    }catch(e){setSaveErr(e.message);showToast("⚠ Save failed",false);}
    setSaving(false);
    ungroup(activeGid);
    setGroups(p=>{const n={...p};delete n[activeGid];return n;});
    setActiveGid(null);setView("floor");
  }

  const agd=activeGid?gdata_(activeGid):null;
  const agTbls=activeGid?gtbls_(activeGid):[];
  const revenue=Object.values(groups).reduce((s,g)=>s+sumOrder(g.ois||[]),0);
  const actCnt=Object.values(groups).filter(g=>g.pax>0).length;

  function mkChip(tid){
    const t=TABLES.find(x=>x.id===tid);if(!t)return null;
    const gid=gid_(tid),gd=gdata_(gid);
    const leader=!tGroup[tid]||groups[gid]?.tableIds[0]===tid;
    return <Chip key={tid} table={t} status={tStatus(tid)} pax={gd.pax} leader={leader} total={sumOrder(gd.ois||[])} isSource={combSrc===tid} combineMode={combMode} onPress={()=>openTable(tid)}/>;
  }
  const L=TABLES.filter(t=>t.zone==="left"),M=TABLES.filter(t=>t.zone==="mid"),R=TABLES.filter(t=>t.zone==="right");

  return(
    <div style={{minHeight:"100dvh",background:C.bg,color:C.txt,fontFamily:"Georgia,'Times New Roman',serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      {toast&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",zIndex:9999,maxWidth:480,width:"100%",background:toast.ok?"#0d2a1a":"#2a0d0d",borderBottom:`2px solid ${toast.ok?C.green:C.red}`,color:toast.ok?C.green:C.red,padding:"11px 20px",textAlign:"center",fontSize:13,fontWeight:"bold"}}>{toast.msg}</div>}

      {view==="floor"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"14px 18px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:17,fontWeight:"bold",letterSpacing:2,color:C.gold}}>HAKKA KOPITIAM</div>

// ── PAX ───────────────────────────────────────────────────
function PaxView({groupTables,onConfirm,onBack}){
  const [val,setVal]=useState("");
  const tap=n=>setVal(v=>v.length>=2?v:(v+n).replace(/^0+/,"")||"0");
  const del=()=>setVal(v=>v.slice(0,-1));
  const go=()=>{const n=parseInt(val);if(n>0)onConfirm(n);};
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 18px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"none",border:`1px solid ${C.bdr}`,color:C.dim,padding:"7px 14px",borderRadius:9,cursor:"pointer",fontSize:14}}>←</button>
        <div>
          <div style={{fontWeight:"bold",color:C.gold,fontSize:16}}>{groupTables.join(" + ")}</div>
          <div style={{fontSize:11,color:C.dim}}>How many guests?</div>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 28px 40px"}}>
        <div style={{fontSize:48,marginBottom:8}}>👥</div>
        <div style={{fontSize:12,color:C.dim,letterSpacing:2,marginBottom:20}}>HOW MANY GUESTS?</div>
        <div style={{width:"100%",maxWidth:290,background:C.surfUp,border:`2px solid ${val?C.gold:C.bdr}`,borderRadius:18,padding:"20px 16px",textAlign:"center",marginBottom:22}}>
          <div style={{fontSize:54,fontWeight:"bold",color:val?C.txt:C.faint,minHeight:66,letterSpacing:6}}>{val||"—"}</div>
          <div style={{fontSize:12,color:C.dim}}>guests</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:"100%",maxWidth:290}}>
          {[1,2,3,4,5,6,7,8,9,"⌫","0","✓"].map((k,i)=>{
            const isC=k==="✓",isD=k==="⌫",dis=isC&&(!val||val==="0");
            return(<button key={i} onClick={()=>isC?go():isD?del():tap(String(k))} disabled={dis}
              style={{padding:"18px 0",borderRadius:13,border:isC?"none":`1px solid ${C.bdr}`,background:isC?(dis?C.bdr:C.gold):C.surfUp,color:isC?(dis?C.faint:"#0d0d0d"):isD?C.dim:C.txt,fontSize:isC?20:22,fontWeight:"bold",cursor:dis?"not-allowed":"pointer"}}>
              {k}</button>);
          })}
        </div>
      </div>
    </div>
  );
}

      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 32px 60px"}}>
        <div style={{fontSize:48,marginBottom:16}}>🔒</div>
        <div style={{fontSize:16,fontWeight:"bold",color:C.txt,marginBottom:6}}>Manager Access Only</div>
        <div style={{fontSize:12,color:C.dim,marginBottom:32,textAlign:"center"}}>Enter password to view business data</div>
        <div style={{width:"100%",maxWidth:300}}>
          <div style={{position:"relative",marginBottom:16}}>
            <input type={show?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="Enter password" autoComplete="off"
              style={{width:"100%",padding:"14px 48px 14px 16px",background:C.surfUp,border:`2px solid ${err?C.red:pw?C.purple:C.bdr}`,borderRadius:12,color:C.txt,fontSize:16,outline:"none",boxSizing:"border-box",transition:"border-color 0.2s",letterSpacing:pw&&!show?"4px":"normal"}}/>
            <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:16,padding:4}}>{show?"🙈":"👁"}</button>
          </div>
          {err&&<div style={{background:"#2a0d0d",border:`1px solid ${C.red}`,borderRadius:8,padding:"10px 14px",textAlign:"center",fontSize:13,color:C.red,marginBottom:14}}>❌ Incorrect password</div>}
          <button onClick={attempt} style={{width:"100%",padding:"15px",background:C.purple,border:"none",color:"#fff",borderRadius:12,cursor:"pointer",fontSize:15,fontWeight:"bold",letterSpacing:1}}>UNLOCK ANALYTICS</button>
        </div>
        <div style={{marginTop:24,fontSize:11,color:C.faint,textAlign:"center"}}>Default password: <span style={{color:C.dim}}>hakka2025</span></div>
      </div>
    </div>
  );
}

// ── ANALYTICS ─────────────────────────────────────────────
function AnalyticsView({onBack}){
  const [orders,setOrders]=useState([]),[loading,setLoading]=useState(true),[error,setError]=useState(null);
  const [range,setRange]=useState("today"),[tab,setTab]=useState("summary");
  useEffect(()=>{load();},[range]);
  async function load(){
    setLoading(true);setError(null);
    try{const data=await dbFetch(rangeFrom(range));setOrders(Array.isArray(data)?data:[]);}
    catch(e){setError(e.message);setOrders([]);}
    setLoading(false);
  }
  const totalRev=orders.reduce((s,o)=>s+(o.total||0),0);
  const totalPax=orders.reduce((s,o)=>s+(o.pax||0),0);
  const totalOrds=orders.length,avgBill=totalOrds>0?totalRev/totalOrds:0,avgPax=totalOrds>0?totalPax/totalOrds:0;
  const itemMap={};
  orders.forEach(o=>(o.items||[]).forEach(it=>{
    if(!itemMap[it.name])itemMap[it.name]={name:it.name,emoji:it.emoji||"",cat:it.cat||"",qty:0,rev:0};
    itemMap[it.name].qty++;itemMap[it.name].rev+=it.price||0;
  }));
  const topItems=Object.values(itemMap).sort((a,b)=>b.qty-a.qty).slice(0,10);
  const tMap={};
  orders.forEach(o=>{const k=o.table_ids||"?";if(!tMap[k])tMap[k]={table:k,visits:0,pax:0,rev:0};tMap[k].visits++;tMap[k].pax+=o.pax||0;tMap[k].rev+=o.total||0;});
  const tStats=Object.values(tMap).sort((a,b)=>b.rev-a.rev);
  const RANGES=[{k:"today",l:"Today"},{k:"week",l:"7 Days"},{k:"month",l:"30 Days"},{k:"all",l:"All Time"}];
  const TABS=[{k:"summary",l:"Recent"},{k:"items",l:"Top Items"},{k:"tables",l:"By Table"}];
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 18px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={onBack} style={{background:"none",border:`1px solid ${C.bdr}`,color:C.dim,padding:"7px 12px",borderRadius:9,cursor:"pointer",fontSize:13}}>←</button>
            <div style={{fontWeight:"bold",color:C.purple,fontSize:15}}>📊 Analytics</div>
          </div>
          <button onClick={load} style={{background:"none",border:`1px solid ${C.bdr}`,color:C.dim,padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:12}}>↻ Refresh</button>
        </div>
        <div style={{display:"flex",gap:6}}>
          {RANGES.map(r=>(
            <button key={r.k} onClick={()=>setRange(r.k)} style={{flex:1,padding:"7px 0",borderRadius:9,border:`1px solid ${range===r.k?C.purple:C.bdr}`,background:range===r.k?C.purple+"33":"none",color:range===r.k?C.purple:C.dim,fontSize:11,cursor:"pointer",fontWeight:range===r.k?"bold":"normal"}}>{r.l}</button>
          ))}
        </div>
      </div>
      {loading?(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
          <div style={{fontSize:30}}>📊</div><div style={{color:C.dim,fontSize:13}}>Loading…</div>
        </div>
      ):error?(
        <div style={{flex:1,padding:"24px 20px"}}>
          <div style={{background:"#2a0a0a",border:`1px solid ${C.red}`,borderRadius:12,padding:"16px"}}>
            <div style={{fontSize:14,color:C.red,fontWeight:"bold",marginBottom:8}}>⚠ Could not load data</div>
            <div style={{fontSize:12,color:"#cc8888",wordBreak:"break-all",marginBottom:12}}>{error}</div>
            <div style={{fontSize:12,color:C.dim,lineHeight:1.8,marginBottom:12}}>
              To fix RLS issue:<br/>
              1. Supabase → Table Editor → orders<br/>
              2. Click <strong style={{color:C.gold}}>RLS Enabled</strong> → <strong style={{color:C.gold}}>Disable RLS</strong>
            </div>
            <button onClick={load} style={{background:C.purple,border:"none",color:"#fff",padding:"10px 20px",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:"bold"}}>Try Again</button>
          </div>
        </div>
      ):(
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px 32px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[{l:"Revenue",v:rm(totalRev),c:C.green,i:"💰"},{l:"Orders",v:totalOrds,c:C.gold,i:"🧾"},{l:"Total Pax",v:totalPax,c:C.blue,i:"👥"},{l:"Avg Bill",v:rm(avgBill),c:C.purple,i:"📈"}].map(s=>(
              <div key={s.l} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"14px"}}>
                <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
                <div style={{fontSize:18,fontWeight:"bold",color:s.c}}>{s.v}</div>
                <div style={{fontSize:10,color:C.dim,marginTop:2}}>{s.l}</div>
              </div>
            ))}
          </div>
          {totalOrds>0&&<div style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:12,color:C.dim}}>Avg guests per visit</div><div style={{fontSize:18,fontWeight:"bold"}}>{avgPax.toFixed(1)} pax</div></div>}
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {TABS.map(t=>(
              <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:"8px 0",borderRadius:9,border:`1px solid ${tab===t.k?C.gold:C.bdr}`,background:tab===t.k?C.gold+"22":"none",color:tab===t.k?C.gold:C.dim,fontSize:12,cursor:"pointer",fontWeight:tab===t.k?"bold":"normal"}}>{t.l}</button>
            ))}
          </div>
          {tab==="summary"&&(
            <div>
              {orders.length===0&&<div style={{color:C.faint,fontSize:13,textAlign:"center",padding:"30px 0"}}>No orders yet for this period</div>}
              {orders.slice(0,20).map(o=>(
                <div key={o.id} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"11px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:"bold",color:C.gold}}>Table {o.table_ids}</div>
                      <div style={{fontSize:11,color:C.dim,marginTop:2}}>👤 {o.pax} pax · {(o.items||[]).length} items</div>
                      <div style={{fontSize:10,color:C.faint,marginTop:2}}>{new Date(o.created_at).toLocaleString("en-MY",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:"bold",color:C.green}}>{rm(o.total)}</div>
                      <div style={{fontSize:10,color:C.dim}}>incl. SST</div>
                    </div>
                  </div>
                  {(o.items||[]).length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.bdr}`,fontSize:11,color:C.dim,lineHeight:1.8}}>{(o.items||[]).map((it,i)=><span key={i}>{it.emoji} {it.name}{it.custom?` (${it.custom})`:""}{i<o.items.length-1?" · ":""}</span>)}</div>}
                </div>
              ))}
            </div>
          )}
          {tab==="items"&&(
            <div>
              {topItems.length===0&&<div style={{color:C.faint,fontSize:13,textAlign:"center",padding:"30px 0"}}>No data yet</div>}
              {topItems.map((it,i)=>(
                <div key={it.name} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:10,marginBottom:8}}>
                  <div style={{fontSize:10,fontWeight:"bold",color:C.faint,minWidth:20,textAlign:"center"}}>#{i+1}</div>
                  <div style={{fontSize:20}}>{it.emoji}</div>
                  <div style={{flex:1}}><div style={{fontSize:13,color:C.txt}}>{it.name}</div><div style={{fontSize:10,color:C.dim,marginTop:2}}>{it.cat}</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:"bold",color:C.gold}}>{it.qty}×</div><div style={{fontSize:11,color:C.green}}>{rm(it.rev)}</div></div>
                </div>
              ))}
            </div>
          )}
          {tab==="tables"&&(
            <div>
              {tStats.length===0&&<div style={{color:C.faint,fontSize:13,textAlign:"center",padding:"30px 0"}}>No data yet</div>}
              {tStats.map(t=>(
                <div key={t.table} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"11px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontSize:13,fontWeight:"bold",color:C.gold}}>Table {t.table}</div><div style={{fontSize:11,color:C.dim,marginTop:2}}>{t.visits} visit{t.visits>1?"s":""} · {t.pax} total pax</div></div>
                  <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:"bold",color:C.green}}>{rm(t.rev)}</div><div style={{fontSize:10,color:C.dim}}>{rm(t.rev/t.visits)}/visit</div></div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
