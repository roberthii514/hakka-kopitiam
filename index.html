async function dbSave(payload) {
  const r = await fetch(SUPA_URL+"/rest/v1/orders",{method:"POST",headers:{...HDR,"Prefer":"return=minimal"},body:JSON.stringify(payload)});
  if(!r.ok) throw new Error("HTTP "+r.status+": "+await r.text());
}
async function dbFetchOrders(fromISO) {
  let url = SUPA_URL+"/rest/v1/orders?select=*&order=created_at.desc&limit=500";
  if(fromISO) url += "&created_at=gte."+encodeURIComponent(fromISO);
  const r = await fetch(url,{headers:HDR});
  if(!r.ok) throw new Error("HTTP "+r.status+": "+await r.text());
  return r.json();
}
async function dbFetchMenu() {

async function dbSaveMenuItem(item) {
  const method = item.id ? "PATCH" : "POST";
  const url = item.id ? SUPA_URL+"/rest/v1/menu_items?id=eq."+item.id : SUPA_URL+"/rest/v1/menu_items";

}

// ── HELPERS ───────────────────────────────────────────────
const hasV   = i => i.v && i.v.length > 0;
const rm     = n => "RM"+(+(n||0)).toFixed(2);
function defSel(item){const s={};(item.v||[]).forEach(vg=>{s[vg.key]=0;});return s;}
function iPrice(item,sel){
  let base=item.price||0;
  (item.v||[]).forEach(vg=>{
    const opt=vg.options[(sel&&sel[vg.key])||0];
    if(!opt)return;
    if(opt.base!==undefined)base=opt.base;else base+=opt.mod||0;
  });
  return base;
}
function iLabel(item,sel){
  return(item.v||[]).map(vg=>{
    const opt=vg.options[(sel&&sel[vg.key])||0];
    return opt?opt.label.replace(/ \(\+RM\d+\)/,""):"";
  }).filter(Boolean).join(" · ");
}
function sumOrder(ois){return(ois||[]).reduce((s,oi)=>s+iPrice(oi.item,oi.sel),0);}
function billGroups(ois){
  const simple=[],complex=[],map={};
  (ois||[]).forEach(oi=>{
    if(!hasV(oi.item)){
      if(!map[oi.item.id]){map[oi.item.id]={oi,qty:0};simple.push(map[oi.item.id]);}
      map[oi.item.id].qty++;
    }else complex.push(oi);
  });
  return{simple,complex};
}
function rangeFrom(r){
  if(r==="all")return null;
  const d=new Date();
  if(r==="today")d.setHours(0,0,0,0);
  else if(r==="week")d.setDate(d.getDate()-7);
  else if(r==="month")d.setDate(d.getDate()-30);
  return d.toISOString();
}
function todayStr(){return new Date().toLocaleDateString("en-MY",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}

function Chip({table,status,pax,leader,total,isSource,combineMode,onPress}){
  const dot=status==="occupied"?C.red:status==="grouped"?C.blue:C.green;
  const bdr=isSource?C.gold:combineMode?C.blue+"66":status==="occupied"?"#5a1a1a":status==="grouped"?"#1a2a5a":C.bdr;
  const bg=isSource?"#221e0a":status==="occupied"?"#1e0c0c":status==="grouped"?"#0c1628":C.surfUp;
  const rnd=table.type!=="sq",big=table.type==="rnd-B",sml=table.type==="rnd-S";
  const w=big?68:sml?50:rnd?58:52;
  return(
    <button onClick={onPress} style={{width:w,height:w,borderRadius:rnd?"50%":9,background:bg,border:`2px solid ${bdr}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",gap:1,flexShrink:0,transition:"all 0.12s",boxShadow:isSource?`0 0 14px ${C.gold}66`:"none"}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:dot,boxShadow:`0 0 6px ${dot}`,marginBottom:1}}/>
      <div style={{fontSize:big?12:11,fontWeight:"bold",color:C.txt,lineHeight:1}}>{table.label}</div>
      <div style={{fontSize:9,color:C.dim,lineHeight:1}}>{table.seats}px</div>
      {pax>0&&<div style={{fontSize:9,color:dot,lineHeight:1}}>👤{pax}</div>}
      {leader&&total>0&&<div style={{position:"absolute",top:-7,right:-4,background:C.gold,color:"#0d0d0d",fontSize:8,fontWeight:"bold",padding:"2px 5px",borderRadius:8}}>{rm(total)}</div>}
    </button>
  );
}

  const [saveErr,   setSaveErr]   = useState(null);
  const [liveMenu,  setLiveMenu]  = useState(null);
  const [menuLoading, setMenuLoading] = useState(true);
  const [custOrders,  setCustOrders]  = useState([]);
  const [showCustOrders, setShowCustOrders] = useState(false);
  const pollRef = useRef(null);

  useEffect(()=>{
    loadMenu();
    pollCustomerOrders();
    pollRef.current = setInterval(pollCustomerOrders, 15000);
    return ()=>clearInterval(pollRef.current);
  },[]);

  async function pollCustomerOrders(){
    try{
      const data = await dbFetchCustomerOrders();
      setCustOrders(Array.isArray(data)?data:[]);
    }catch(e){}
  }

  async function confirmCustOrder(order){
    try{
      await dbConfirmCustomerOrder(order.id);
      setCustOrders(prev=>prev.filter(o=>o.id!==order.id));

      // ── Wire up the floor map ──────────────────────────
      const tid = order.table_id; // e.g. "L1"
      const gid = tid; // standalone group id = table id

      // Build orderItems from the customer order items
      // We create simple "virtual" item objects from the saved data
      const ois = (order.items||[]).flatMap(it=>{
        const arr = [];
        for(let q=0;q<(it.qty||1);q++){
          arr.push({
            id: Date.now()+"_"+Math.random(),
            item: {
              id: "cust_"+it.name.replace(/\s/g,"_"),
              name: it.name,
              zh: it.zh||"",
              emoji: it.emoji||"🍜",
              price: it.price||0,
              v: [], // no variations needed — already resolved
            },
            sel: {},
          });
        }
        return arr;
      });

      // Use pax from customer order, fallback to 1
      const pax = order.pax || 1;

      setGroups(prev=>{
        const existing = prev[gid];
        if(existing){
          // Table already has a session — append items
          return{...prev,[gid]:{...existing,ois:[...existing.ois,...ois]}};
        } else {
          // New session for this table
          return{...prev,[gid]:{tableIds:[tid],pax,ois}};
        }
      });

      // Make sure tGroup knows about this table
      setTGroup(prev=>({...prev,[tid]:tid}));
      // Remove the tGroup entry so the table uses its own id as gid
      setTGroup(prev=>{const n={...prev};delete n[tid];return n;});

      showToast("✓ Table "+tid+" is now active with customer order",true);
    }catch(e){showToast("Error confirming: "+e.message,false);}
  }

  async function dismissCustOrder(id){
    try{
      await dbDismissCustomerOrder(id);
      setCustOrders(prev=>prev.filter(o=>o.id!==id));
    }catch(e){}
  }

  async function loadMenu(){
    setMenuLoading(true);
    try{
      const items = await dbFetchMenu();
      if(items && items.length > 0){
        // Group by category
        const grouped = {};
        items.forEach(item=>{
          const cat = item.category;
          if(!grouped[cat]) grouped[cat]=[];
          // parse variations from jsonb
          const v = item.variations ? (typeof item.variations === "string" ? JSON.parse(item.variations) : item.variations) : [];
          grouped[cat].push({
            id: item.id,
            name: item.name,
            zh: item.name_zh||"",
            price: parseFloat(item.price)||0,
            big: item.price_big ? parseFloat(item.price_big) : null,
            disp: item.price_display||null,
            emoji: item.emoji||"☕",
            tag: null,
            v: v,
            sold_out: item.sold_out||false,
            _db: true,
          });
        });
        setLiveMenu(grouped);
        const cats = Object.keys(grouped);
        setMenuCat(cats[0]||null);
      } else {
        // Use default menu
        setLiveMenu(null);
        setMenuCat(ALL_CATS_DEFAULT[0]);
      }
    } catch(e){
      console.error("Menu load failed:",e);
      setLiveMenu(null);
      setMenuCat(ALL_CATS_DEFAULT[0]);
    }
    setMenuLoading(false);
  }

  const MENU = liveMenu || DEFAULT_MENU;
  const ALL_CATS = Object.keys(MENU);

  function showToast(msg,ok){setToast({msg,ok});setTimeout(()=>setToast(null),4000);}
  const gid_   = tid => tGroup[tid]||tid;
  const gdata_ = gid => groups[gid]||{tableIds:[gid],pax:0,ois:[]};
  const gtbls_ = gid => groups[gid]?groups[gid].tableIds:[gid];
  function tStatus(tid){
    const gd=gdata_(gid_(tid));
    if(gd.pax>0)return"occupied";
    if(tGroup[tid]||groups[gid_(tid)])return"grouped";
    return"available";
  }
  function startComb(){setCombMode(true);setCombSrc(null);}
  function cancelComb(){setCombMode(false);setCombSrc(null);}
  function onCombTap(tid){
    if(!combSrc){setCombSrc(tid);return;}
    if(combSrc===tid){setCombSrc(null);return;}
    const sg=gid_(combSrc),dg=gid_(tid);
    if(sg===dg){cancelComb();return;}
    const nid="G"+Date.now();
    const all=[...new Set([...gtbls_(sg),...gtbls_(dg)])];
    const ois=[...(gdata_(sg).ois||[]),...(gdata_(dg).ois||[])];
    setGroups(p=>{const n={...p};delete n[sg];delete n[dg];n[nid]={tableIds:all,pax:0,ois};return n;});
    setTGroup(p=>{const n={...p};all.forEach(id=>{n[id]=nid;});return n;});
    cancelComb();
  }
  function ungroup(gid){
    const g=groups[gid];if(!g)return;
    setGroups(p=>{const n={...p};delete n[gid];return n;});
    setTGroup(p=>{const n={...p};g.tableIds.forEach(id=>delete n[id]);return n;});
  }
  function openTable(tid){
    if(combMode){onCombTap(tid);return;}
    const gid=gid_(tid),gd=gdata_(gid);
    setActiveGid(gid);
    if(gd.pax===0)setView("pax");
    else{setView("order");setMenuCat(ALL_CATS[0]);}
  }
  function confirmPax(n){
    setGroups(p=>{const ex=p[activeGid]||{tableIds:[activeGid],ois:[]};return{...p,[activeGid]:{...ex,pax:n}};});
    setView("order");setMenuCat(ALL_CATS[0]);
  }
  function addItem(item){
    if(item.sold_out) return;
    const inst={id:Date.now()+"_"+Math.random(),item,sel:defSel(item)};
    setGroups(p=>{const gd=p[activeGid]||{tableIds:[activeGid],pax:0,ois:[]};return{...p,[activeGid]:{...gd,ois:[...gd.ois,inst]}};});
  }
  function removeItem(itemId){
    setGroups(p=>{
      const gd=p[activeGid];if(!gd)return p;
      const ois=[...gd.ois];
      let found=-1;for(let i=ois.length-1;i>=0;i--){if(ois[i].item.id===itemId){found=i;break;}}
      if(found===-1)return p;
      ois.splice(found,1);
      return{...p,[activeGid]:{...gd,ois}};
    });
  }
  function updateVar(instId,vKey,oIdx){
    setGroups(p=>{
      const gd=p[activeGid];if(!gd)return p;
      return{...p,[activeGid]:{...gd,ois:gd.ois.map(oi=>oi.id===instId?{...oi,sel:{...oi.sel,[vKey]:oIdx}}:oi)}};
    });
  }
  async function sendToKitchen(){
    const gd = gdata_(activeGid);
    const sub = sumOrder(gd.ois||[]);
    const items = (gd.ois||[]).map(oi=>({
      name: oi.item.name,
      zh: oi.item.zh,
      emoji: oi.item.emoji,
      price: iPrice(oi.item, oi.sel),
      qty: 1,
      custom: iLabel(oi.item, oi.sel)||null,
      cat: ALL_CATS.find(c=>MENU[c].some(m=>m.id===oi.item.id))||"",
    }));
    try{
      await dbSendToKitchen(gdata_(activeGid).tableIds, gdata_(activeGid).pax, items, sub);
      showToast("✓ Order sent to kitchen",true);
    }catch(e){
      showToast("⚠ Could not send to kitchen",false);
    }
  }

  async function closeTable(){
    const gd=gdata_(activeGid);
    const sub=sumOrder(gd.ois);
    const items=(gd.ois||[]).map(oi=>({name:oi.item.name,zh:oi.item.zh,emoji:oi.item.emoji,price:iPrice(oi.item,oi.sel),custom:iLabel(oi.item,oi.sel)||null,cat:ALL_CATS.find(c=>MENU[c].some(m=>m.id===oi.item.id))||""}));
    setSaving(true);setSaveErr(null);
    try{
      await dbSave({table_ids:gd.tableIds.join(", "),pax:gd.pax,items,subtotal:+sub.toFixed(2),tax:0,total:+sub.toFixed(2)});
      showToast("✓ Order saved",true);
    }catch(e){setSaveErr(e.message);showToast("⚠ Save failed",false);}
    setSaving(false);
    ungroup(activeGid);
    setGroups(p=>{const n={...p};delete n[activeGid];return n;});
    setActiveGid(null);setView("floor");
  }

  const agd=activeGid?gdata_(activeGid):null;
  const agTbls=activeGid?gtbls_(activeGid):[];
  const revenue=Object.values(groups).reduce((s,g)=>s+sumOrder(g.ois||[]),0);
  const actCnt=Object.values(groups).filter(g=>g.pax>0).length;

  function mkChip(tid){
    const t=TABLES.find(x=>x.id===tid);if(!t)return null;
    const gid=gid_(tid),gd=gdata_(gid);
    const leader=!tGroup[tid]||groups[gid]?.tableIds[0]===tid;
    return<Chip key={tid} table={t} status={tStatus(tid)} pax={gd.pax} leader={leader} total={sumOrder(gd.ois||[])} isSource={combSrc===tid} combineMode={combMode} onPress={()=>openTable(tid)}/>;
  }
  const L=TABLES.filter(t=>t.zone==="left"),M=TABLES.filter(t=>t.zone==="mid"),R=TABLES.filter(t=>t.zone==="right");

  return(
    <div style={{minHeight:"100dvh",background:C.bg,color:C.txt,fontFamily:"Georgia,'Times New Roman',serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      {toast&&<div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",zIndex:9999,maxWidth:480,width:"100%",background:toast.ok?"#0d2a1a":"#2a0d0d",borderBottom:`2px solid ${toast.ok?C.green:C.red}`,color:toast.ok?C.green:C.red,padding:"11px 20px",textAlign:"center",fontSize:13,fontWeight:"bold"}}>{toast.msg}</div>}

      {/* ── FLOOR ── */}
      {view==="floor"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"14px 18px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:17,fontWeight:"bold",letterSpacing:2,color:C.gold}}>HAKKA KOPITIAM</div>
                <div style={{fontSize:10,color:C.dim}}>家的味道 · Taman Gembira, KL</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>setShowCustOrders(s=>!s)} className={custOrders.length>0?"bell-pulse":""} style={{position:"relative",background:custOrders.length>0?"#8b0000":C.surfUp,border:`1.5px solid ${custOrders.length>0?C.red:C.bdr}`,color:custOrders.length>0?"#fff":C.dim,padding:"7px 11px",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:"bold",transition:"background 0.2s",boxShadow:custOrders.length>0?`0 0 12px ${C.red}66`:"none"}}>
                  🔔{custOrders.length>0&&<span style={{marginLeft:4}}>{custOrders.length}</span>}
                </button>
                <button onClick={()=>setView("admin_login")} style={{background:C.orange+"22",border:`1px solid ${C.orange}66`,color:C.orange,padding:"7px 11px",borderRadius:9,cursor:"pointer",fontSize:12}}>⚙️</button>
                <button onClick={()=>setView("analytics_login")} style={{background:C.purple+"22",border:`1px solid ${C.purple}66`,color:C.purple,padding:"7px 11px",borderRadius:9,cursor:"pointer",fontSize:12}}>📊</button>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              {[{l:"Tables",v:TABLES.length,c:C.dim},{l:"Active",v:actCnt,c:C.red},{l:"Session",v:rm(revenue),c:C.green}].map(s=>(
                <div key={s.l} style={{flex:1,background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"8px 0",textAlign:"center"}}>
                  <div style={{fontSize:15,fontWeight:"bold",color:s.c}}>{s.v}</div>
                  <div style={{fontSize:9,color:C.faint,letterSpacing:1}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* CUSTOMER ORDERS PANEL */}
          {showCustOrders&&(
            <div style={{background:"#1a0808",borderBottom:`2px solid ${C.red}`,padding:"12px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:13,color:C.red,fontWeight:"bold"}}>🔔 Incoming Customer Orders</div>
                <button onClick={()=>setShowCustOrders(false)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:16}}>✕</button>
              </div>
              {custOrders.length===0?(
                <div style={{fontSize:12,color:C.dim,textAlign:"center",padding:"10px 0"}}>No pending orders right now ✓</div>
              ):<>
              <div style={{fontSize:11,color:C.dim,marginBottom:10,lineHeight:1.6}}>Tap <strong style={{color:C.green}}>Confirm</strong> to accept the order and activate the table on the floor map.</div>
              {custOrders.map(o=>(
                <div key={o.id} style={{background:C.surfUp,border:`1px solid ${C.red}33`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:"bold",color:C.gold}}>Table {o.table_id}</div>
                      <div style={{fontSize:10,color:C.dim,marginTop:2}}>{new Date(o.created_at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})} · 👤 {o.pax||"?"} pax</div>
                    </div>
                    <div style={{fontSize:14,fontWeight:"bold",color:C.green}}>RM{(o.total||0).toFixed(2)}</div>
                  </div>
                  <div style={{fontSize:11,color:C.dim,lineHeight:1.8,marginBottom:o.note?8:10}}>
                    {(o.items||[]).map((it,i)=>(
                      <span key={i}>{it.emoji} {it.name}{it.custom?` (${it.custom})`:""}{it.qty>1?` x${it.qty}`:""}{i<o.items.length-1?" · ":""}</span>
                    ))}
                  </div>
                  {o.note&&(
                    <div style={{background:"#2a1a08",border:`1px solid ${C.bdrHi}`,borderRadius:7,padding:"6px 10px",fontSize:11,color:C.gold,marginBottom:10}}>
                      📝 {o.note}
                    </div>
                  )}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>confirmCustOrder(o)} style={{flex:2,padding:"8px",background:C.green,border:"none",color:"#fff",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:"bold"}}>✓ Confirm</button>
                    <button onClick={()=>dismissCustOrder(o.id)} style={{flex:1,padding:"8px",background:"none",border:`1px solid ${C.bdr}`,color:C.dim,borderRadius:8,cursor:"pointer",fontSize:12}}>Dismiss</button>
                  </div>
                </div>
              ))}
              </>}
            </div>
          )}

          {saveErr&&(
            <div style={{background:"#2a0a0a",border:`1px solid ${C.red}`,margin:"8px 16px",borderRadius:10,padding:"10px 14px"}}>
              <div style={{fontSize:12,color:C.red,fontWeight:"bold",marginBottom:4}}>⚠ Save Error — Disable RLS in Supabase</div>
              <div style={{fontSize:11,color:"#cc8888",wordBreak:"break-all"}}>{saveErr}</div>
              <button onClick={()=>setSaveErr(null)} style={{marginTop:8,background:"none",border:`1px solid ${C.red}`,color:C.red,padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:11}}>Dismiss</button>
            </div>
          )}

          {combMode?(
            <div style={{background:"#0e1828",borderBottom:`1.5px solid ${C.blue}`,padding:"11px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:13,color:C.blue,fontWeight:"bold"}}>{!combSrc?"① Tap first table":`Moving ${combSrc} → tap destination`}</div>
                <div style={{fontSize:11,color:"#4a6a9a",marginTop:2}}>{!combSrc?"Select a table":"Tap any table to merge"}</div>
              </div>
              <button onClick={cancelComb} style={{background:"none",border:`1px solid ${C.blue}`,color:C.blue,padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Cancel</button>
            </div>
          ):(
            <div style={{padding:"12px 18px 0"}}>
              <button onClick={startComb} style={{width:"100%",padding:"12px",background:C.surfUp,border:`1.5px dashed ${C.bdrHi}`,borderRadius:12,color:C.dim,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{fontSize:16}}>⛓</span> COMBINE TABLES
              </button>
            </div>
          )}

          <div style={{padding:"9px 18px 4px",display:"flex",gap:16}}>
            {[{c:C.green,l:"Available"},{c:C.red,l:"Occupied"},{c:C.blue,l:"Grouped"}].map(x=>(
              <div key={x.l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.dim}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:x.c,boxShadow:`0 0 5px ${x.c}`}}/>{x.l}
              </div>
            ))}
          </div>

          <div style={{flex:1,overflowY:"auto",padding:"6px 14px 24px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{flex:1,height:1,background:C.bdr}}/>
              <div style={{fontSize:10,color:C.dim,letterSpacing:2}}>🚪 ENTRANCE</div>
              <div style={{flex:1,height:1,background:C.bdr}}/>
            </div>
            <div style={{border:`1.5px solid ${C.bdrHi}`,borderRadius:14,background:"#111009",padding:"12px 8px",display:"flex",alignItems:"stretch",minHeight:480}}>
              <div style={{width:80,borderRight:`1px solid ${C.bdr}`,display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:"4px 0"}}>
                <div style={{fontSize:8,color:C.faint,letterSpacing:2,marginBottom:4}}>LEFT</div>
                {L.map(t=>mkChip(t.id))}
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-evenly",padding:"20px 4px",gap:16}}>
                {M.map(t=>mkChip(t.id))}
              </div>
              <div style={{width:80,borderLeft:`1px solid ${C.bdr}`,display:"flex",flexDirection:"column",alignItems:"center",gap:10,padding:"4px 0"}}>
                <div style={{fontSize:8,color:C.faint,letterSpacing:2,marginBottom:4}}>RIGHT</div>
                {R.map(t=>mkChip(t.id))}
              </div>
            </div>
            <div style={{marginTop:10,border:`1.5px solid ${C.bdrHi}`,borderRadius:10,background:"#0f0d08",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
              <div style={{flex:1,height:2,background:C.bdrHi,borderRadius:2}}/>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:16}}>☕</div>
                <div style={{fontSize:10,color:C.dim,letterSpacing:2,marginTop:2}}>BACK COUNTER</div>
                <div style={{fontSize:9,color:C.faint}}>no seating</div>
              </div>
              <div style={{flex:1,height:2,background:C.bdrHi,borderRadius:2}}/>
            </div>
            {actCnt>0&&(
              <div style={{marginTop:16}}>
                <div style={{fontSize:10,color:C.dim,letterSpacing:2,marginBottom:10}}>ACTIVE SESSIONS</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {Object.entries(groups).filter(([,g])=>g.pax>0).map(([gid,gd])=>(
                    <button key={gid} onClick={()=>{setActiveGid(gid);setView("order");setMenuCat(ALL_CATS[0]);}} style={{background:C.surfUp,border:`1px solid ${C.bdrHi}`,borderRadius:12,padding:"13px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left"}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:"bold",color:C.gold}}>{gd.tableIds.join(" + ")}</div>
                        <div style={{fontSize:11,color:C.dim,marginTop:2}}>👤 {gd.pax} guests · {(gd.ois||[]).length} items</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:16,fontWeight:"bold",color:C.green}}>{rm(sumOrder(gd.ois||[]))}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {view==="pax"&&<PaxView groupTables={agTbls} onConfirm={confirmPax} onBack={()=>{setActiveGid(null);setView("floor");}}/>}
      {view==="order"&&agd&&menuCat&&<OrderView MENU={MENU} ALL_CATS={ALL_CATS} groupTables={agTbls} gd={agd} cat={menuCat} setCat={setMenuCat} addItem={addItem} removeItem={removeItem} updateVar={updateVar} onBill={()=>setView("total")} onBack={()=>setView("floor")} onSendKitchen={sendToKitchen}/>}
      {view==="total"&&agd&&<BillView groupTables={agTbls} gd={agd} saving={saving} onBack={()=>setView("order")} onClose={closeTable}/>}
      {view==="analytics_login"&&<GateView title="📊 Analytics" icon="🔒" onSuccess={()=>setView("analytics")} onBack={()=>setView("floor")}/>}
      {view==="analytics"&&<AnalyticsView onBack={()=>setView("floor")}/>}
      {view==="admin_login"&&<GateView title="⚙️ Menu Management" icon="🛠" onSuccess={()=>setView("admin")} onBack={()=>setView("floor")}/>}
      {view==="admin"&&<AdminView MENU={MENU} onBack={()=>{setView("floor");loadMenu();}} onReload={loadMenu}/>}
    </div>
  );
}

// ── PASSWORD GATE (shared for analytics + admin) ──────────

    <div style={{flex:1,display:"flex",flexDirection:"column"}}>

      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 32px 60px"}}>
        <div style={{fontSize:48,marginBottom:16}}>{icon}</div>
        <div style={{fontSize:16,fontWeight:"bold",color:C.txt,marginBottom:6}}>Manager Access Only</div>
        <div style={{fontSize:12,color:C.dim,marginBottom:32,textAlign:"center"}}>Enter password to continue</div>
        <div style={{width:"100%",maxWidth:300}}>
          <div style={{position:"relative",marginBottom:16}}>
            <input type={show?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="Enter password" autoComplete="off"
              style={{width:"100%",padding:"14px 48px 14px 16px",background:C.surfUp,border:`2px solid ${err?C.red:pw?C.purple:C.bdr}`,borderRadius:12,color:C.txt,fontSize:16,outline:"none",boxSizing:"border-box",transition:"border-color 0.2s",letterSpacing:pw&&!show?"4px":"normal"}}/>
            <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:16,padding:4}}>{show?"🙈":"👁"}</button>
          </div>
          {err&&<div style={{background:"#2a0d0d",border:`1px solid ${C.red}`,borderRadius:8,padding:"10px 14px",textAlign:"center",fontSize:13,color:C.red,marginBottom:14}}>❌ Incorrect password</div>}
          <button onClick={attempt} style={{width:"100%",padding:"15px",background:C.purple,border:"none",color:"#fff",borderRadius:12,cursor:"pointer",fontSize:15,fontWeight:"bold",letterSpacing:1}}>UNLOCK</button>
        </div>
        <div style={{marginTop:20,fontSize:11,color:C.faint,textAlign:"center"}}>Default: <span style={{color:C.dim}}>hakka2025</span></div>
      </div>
    </div>
  );
}

// ── PAX ───────────────────────────────────────────────────
function PaxView({groupTables,onConfirm,onBack}){
  const [val,setVal]=useState("");
  const tap=n=>setVal(v=>v.length>=2?v:(v+n).replace(/^0+/,"")||"0");
  const del=()=>setVal(v=>v.slice(0,-1));
  const go=()=>{const n=parseInt(val);if(n>0)onConfirm(n);};
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 18px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"none",border:`1px solid ${C.bdr}`,color:C.dim,padding:"7px 14px",borderRadius:9,cursor:"pointer",fontSize:14}}>←</button>
        <div>

// ADMIN — MENU MANAGEMENT
// ══════════════════════════════════════════════════════════
function AdminView({MENU,onBack,onReload}){
  const [tab,setTab]=useState("items"); // items | add
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editItem,setEditItem]=useState(null);
  const [saving,setSaving]=useState(null);
  const [msg,setMsg]=useState(null);

  useEffect(()=>{load();},[]);

  async function load(){
    setLoading(true);
    try{
      const data=await dbFetchMenu();
      setItems(data||[]);
    }catch(e){setMsg({text:"Failed to load: "+e.message,ok:false});}
    setLoading(false);
  }

  function showMsg(text,ok){setMsg({text,ok});setTimeout(()=>setMsg(null),3000);}

  async function toggleSoldOut(item){
    setSaving(item.id);
    try{
      await dbToggleSoldOut(item.id,!item.sold_out);
      setItems(prev=>prev.map(i=>i.id===item.id?{...i,sold_out:!i.sold_out}:i));
      showMsg((!item.sold_out?"Marked sold out: ":"Back in stock: ")+item.name,true);
    }catch(e){showMsg("Error: "+e.message,false);}
    setSaving(null);
  }

  async function deleteItem(item){
    if(!confirm("Delete "+item.name+"?"))return;
    setSaving(item.id);
    try{
      await dbDeleteMenuItem(item.id);
      setItems(prev=>prev.filter(i=>i.id!==item.id));
      showMsg("Deleted: "+item.name,true);
      onReload();
    }catch(e){showMsg("Error: "+e.message,false);}
    setSaving(null);
  }

  // group by category
  const grouped={};
  items.forEach(i=>{
    if(!grouped[i.category])grouped[i.category]=[];
    grouped[i.category].push(i);
  });

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 18px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={onBack} style={{background:"none",border:`1px solid ${C.bdr}`,color:C.dim,padding:"7px 12px",borderRadius:9,cursor:"pointer",fontSize:13}}>←</button>
            <div style={{fontWeight:"bold",color:C.orange,fontSize:15}}>⚙️ Menu Management</div>
          </div>
          <button onClick={()=>{setEditItem({isNew:true});setTab("edit");}} style={{background:C.green,border:"none",color:"#fff",padding:"7px 14px",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:"bold"}}>+ Add</button>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[{k:"items",l:"Menu Items"},{k:"note",l:"ℹ️ Notes"}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:"7px 0",borderRadius:9,border:`1px solid ${tab===t.k?C.orange:C.bdr}`,background:tab===t.k?C.orange+"33":"none",color:tab===t.k?C.orange:C.dim,fontSize:12,cursor:"pointer",fontWeight:tab===t.k?"bold":"normal"}}>{t.l}</button>
          ))}
        </div>
      </div>

      {msg&&<div style={{background:msg.ok?"#0d2a1a":"#2a0d0d",borderBottom:`1px solid ${msg.ok?C.green:C.red}`,color:msg.ok?C.green:C.red,padding:"10px 18px",fontSize:13,textAlign:"center",fontWeight:"bold"}}>{msg.text}</div>}

      {tab==="edit"&&editItem&&(
        <ItemForm item={editItem} onSave={async(payload)=>{
          setSaving("form");
          try{
            await dbSaveMenuItem(payload);
            showMsg(payload.id?"Updated: "+payload.name:"Added: "+payload.name,true);
            await load();onReload();setTab("items");setEditItem(null);
          }catch(e){showMsg("Error: "+e.message,false);}
          setSaving(null);
        }} onCancel={()=>{setTab("items");setEditItem(null);}} saving={saving==="form"}/>
      )}

      {tab==="items"&&(
        <div style={{flex:1,overflowY:"auto",padding:"12px 16px 32px"}}>
          {loading?<div style={{textAlign:"center",color:C.dim,padding:"40px 0",fontSize:13}}>Loading menu…</div>
          :items.length===0?<div style={{textAlign:"center",color:C.faint,padding:"40px 0",fontSize:13}}>No items in database yet.<br/>Tap + Add to create items.</div>
          :Object.entries(grouped).map(([cat,catItems])=>(
            <div key={cat} style={{marginBottom:20}}>
              <div style={{fontSize:11,color:C.gold,letterSpacing:2,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.bdrHi}`}}>{cat}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {catItems.map(item=>(
                  <div key={item.id} style={{background:C.surfUp,border:`1px solid ${item.sold_out?"#3a1010":C.bdr}`,borderRadius:10,padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:22,flexShrink:0}}>{item.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:item.sold_out?C.dim:C.txt,fontWeight:"bold"}}>{item.name}</div>
                      <div style={{fontSize:10,color:C.dim,marginTop:1}}>{item.name_zh}</div>
                      <div style={{fontSize:12,color:C.gold,marginTop:2}}>
                        {item.price_display||( item.price_big?`RM${item.price}–RM${item.price_big}`:`RM${item.price}`)}
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
                      <button onClick={()=>toggleSoldOut(item)} disabled={saving===item.id}
                        style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${item.sold_out?C.green:C.red}`,background:"none",color:item.sold_out?C.green:C.red,fontSize:10,cursor:"pointer",whiteSpace:"nowrap"}}>
                        {item.sold_out?"✓ In Stock":"✗ Sold Out"}
                      </button>
                      <div style={{display:"flex",gap:5}}>
                        <button onClick={()=>{setEditItem({...item,isNew:false});setTab("edit");}} style={{flex:1,padding:"5px 8px",borderRadius:7,border:`1px solid ${C.bdr}`,background:"none",color:C.dim,fontSize:10,cursor:"pointer"}}>Edit</button>
                        <button onClick={()=>deleteItem(item)} disabled={saving===item.id} style={{flex:1,padding:"5px 8px",borderRadius:7,border:`1px solid ${C.red}22`,background:"none",color:C.red,fontSize:10,cursor:"pointer"}}>Del</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==="note"&&(
        <div style={{flex:1,overflowY:"auto",padding:"20px 18px"}}>
          <div style={{background:C.surfUp,border:`1px solid ${C.bdrHi}`,borderRadius:12,padding:"18px"}}>
            <div style={{fontSize:14,color:C.gold,fontWeight:"bold",marginBottom:12}}>Menu Management Notes</div>
            {[
              ["Adding items","Items added here are saved to Supabase and load automatically on all devices."],
              ["Default menu","If the database is empty, the app falls back to the built-in default menu."],
              ["Sold Out","Marking an item sold out greys it out on the order screen — staff cannot add it."],
              ["Variations","For items with size/temp/style options, variations are inherited from the default menu. Custom variation editing coming in v2."],
              ["Multi-device sync","Real-time sync across devices is a premium feature (requires Supabase Pro). Contact us to upgrade."],
            ].map(([title,desc])=>(
              <div key={title} style={{marginBottom:14,paddingBottom:14,borderBottom:`1px solid ${C.bdr}`}}>
                <div style={{fontSize:12,color:C.txt,fontWeight:"bold",marginBottom:4}}>{title}</div>
                <div style={{fontSize:11,color:C.dim,lineHeight:1.6}}>{desc}</div>
              </div>
            ))}
            <div style={{background:"#0e1828",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"14px"}}>
              <div style={{fontSize:12,color:C.blue,fontWeight:"bold",marginBottom:6}}>📡 Want Multi-Device Sync?</div>
              <div style={{fontSize:11,color:C.dim,lineHeight:1.7}}>Enable real-time order sync across multiple tablets or phones. Staff at different tables can take orders simultaneously and everything stays in sync. Requires Supabase Pro upgrade.</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ITEM FORM ─────────────────────────────────────────────
function ItemForm({item,onSave,onCancel,saving}){
  const cats = [...ALL_CATS_DEFAULT,"Custom"];
  const [form,setForm]=useState({
    id: item.id||null,
    category: item.category||ALL_CATS_DEFAULT[0],
    name: item.name||"",
    name_zh: item.name_zh||"",
    emoji: item.emoji||"☕",
    price: item.price||"",
    price_big: item.price_big||"",
    price_display: item.price_display||"",
    sort_order: item.sort_order||0,
    sold_out: item.sold_out||false,
    variations: item.variations||[],
  });
  const [customCat,setCustomCat]=useState("");
  const [showEmoji,setShowEmoji]=useState(false);

  function set(k,v){setForm(f=>({...f,[k]:v}));}
  function submit(){
    if(!form.name||!form.price)return alert("Name and price are required.");
    const cat = form.category==="Custom"?(customCat||"Other"):form.category;
    onSave({...form,category:cat,price:parseFloat(form.price)||0,price_big:form.price_big?parseFloat(form.price_big):null,price_display:form.price_display||null});
  }

  const inp = {width:"100%",padding:"11px 14px",background:C.surfUp,border:`1px solid ${C.bdrHi}`,borderRadius:10,color:C.txt,fontSize:14,outline:"none",boxSizing:"border-box"};

  return(
    <div style={{flex:1,overflowY:"auto",padding:"16px 18px 32px"}}>
      <div style={{fontSize:14,color:C.orange,fontWeight:"bold",marginBottom:16}}>{item.isNew?"Add New Item":"Edit Item"}</div>

      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {/* Emoji picker */}
        <div>
          <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Emoji</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setShowEmoji(s=>!s)} style={{fontSize:28,background:C.surfUp,border:`1px solid ${C.bdrHi}`,borderRadius:10,padding:"8px 14px",cursor:"pointer"}}>{form.emoji}</button>
            <div style={{fontSize:11,color:C.dim}}>Tap to choose</div>
          </div>
          {showEmoji&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8,background:C.surfUp,border:`1px solid ${C.bdrHi}`,borderRadius:10,padding:"10px"}}>
              {EMOJIS.map(e=>(
                <button key={e} onClick={()=>{set("emoji",e);setShowEmoji(false);}} style={{fontSize:22,background:"none",border:"none",cursor:"pointer",padding:"4px"}}>{e}</button>
              ))}
            </div>
          )}
        </div>

        {/* Category */}
        <div>
          <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Category</div>
          <select value={form.category} onChange={e=>set("category",e.target.value)} style={{...inp}}>
            {cats.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          {form.category==="Custom"&&<input value={customCat} onChange={e=>setCustomCat(e.target.value)} placeholder="Category name" style={{...inp,marginTop:8}}/>}
        </div>

        {/* Name */}
        <div>
          <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Item Name (English)</div>
          <input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Wanton Noodles" style={inp}/>
        </div>
        <div>
          <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Item Name (中文 optional)</div>
          <input value={form.name_zh} onChange={e=>set("name_zh",e.target.value)} placeholder="e.g. 云吞面" style={inp}/>
        </div>

        {/* Price */}
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Price (RM) *</div>
            <input type="number" value={form.price} onChange={e=>set("price",e.target.value)} placeholder="0.00" style={inp}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Big Price (optional)</div>
            <input type="number" value={form.price_big} onChange={e=>set("price_big",e.target.value)} placeholder="0.00" style={inp}/>
          </div>
        </div>

        {/* Price display override */}
        <div>
          <div style={{fontSize:11,color:C.dim,marginBottom:6}}>Price Display Override (optional)</div>
          <input value={form.price_display} onChange={e=>set("price_display",e.target.value)} placeholder='e.g. "RM2.50/pc" or "Ask staff"' style={inp}/>
        </div>

        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button onClick={onCancel} style={{flex:1,padding:"14px",background:"none",border:`1px solid ${C.bdr}`,color:C.dim,borderRadius:12,cursor:"pointer",fontSize:14}}>Cancel</button>
          <button onClick={submit} disabled={saving} style={{flex:2,padding:"14px",background:saving?C.bdr:C.orange,border:"none",color:saving?C.faint:"#fff",borderRadius:12,cursor:saving?"not-allowed":"pointer",fontSize:14,fontWeight:"bold"}}>
            {saving?"Saving…":item.isNew?"Add Item":"Save Changes"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// ANALYTICS — FULL DASHBOARD
// ══════════════════════════════════════════════════════════
function AnalyticsView({onBack}){
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [range,setRange]=useState("today");
  const [tab,setTab]=useState("overview");

  useEffect(()=>{load();},[range]);

  async function load(){
    setLoading(true);setError(null);
    try{const data=await dbFetchOrders(rangeFrom(range));setOrders(Array.isArray(data)?data:[]);}
    catch(e){setError(e.message);setOrders([]);}
    setLoading(false);
  }

  // ── Stats ─────────────────────────────────────────────
  const totalRev   = orders.reduce((s,o)=>s+(o.total||0),0);
  const totalPax   = orders.reduce((s,o)=>s+(o.pax||0),0);
  const totalOrds  = orders.length;
  const avgBill    = totalOrds>0?totalRev/totalOrds:0;
  const avgPax     = totalOrds>0?totalPax/totalOrds:0;

  // Item map
  const itemMap={};
  orders.forEach(o=>(o.items||[]).forEach(it=>{
    if(!itemMap[it.name])itemMap[it.name]={name:it.name,emoji:it.emoji||"",cat:it.cat||"",qty:0,rev:0};
    itemMap[it.name].qty++;itemMap[it.name].rev+=it.price||0;
  }));
  const topItems=Object.values(itemMap).sort((a,b)=>b.qty-a.qty);
  const bottomItems=[...topItems].reverse().slice(0,5);

  // Category revenue
  const catMap={};
  orders.forEach(o=>(o.items||[]).forEach(it=>{
    const c=it.cat||"Other";
    if(!catMap[c])catMap[c]={cat:c,rev:0,qty:0};
    catMap[c].rev+=it.price||0;catMap[c].qty++;
  }));
  const catStats=Object.values(catMap).sort((a,b)=>b.rev-a.rev);
  const maxCatRev=catStats.length?catStats[0].rev:1;

  // Peak hours
  const hourMap={};
  for(let i=6;i<=22;i++) hourMap[i]={hour:i,count:0,rev:0};
  orders.forEach(o=>{
    const h=new Date(o.created_at).getHours();
    if(hourMap[h]){hourMap[h].count++;hourMap[h].rev+=o.total||0;}
  });
  const hourStats=Object.values(hourMap);
  const maxHour=hourStats.reduce((m,h)=>h.count>m?h.count:m,1);

  // Day of week
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const dayMap={};
  DAYS.forEach(d=>{dayMap[d]={day:d,rev:0,count:0};});
  orders.forEach(o=>{
    const d=DAYS[new Date(o.created_at).getDay()];
    dayMap[d].rev+=o.total||0;dayMap[d].count++;
  });
  const dayStats=DAYS.map(d=>dayMap[d]);
  const maxDayRev=dayStats.reduce((m,d)=>d.rev>m?d.rev:m,1);

  // End of day report text for WhatsApp
  function buildReport(){
    const top3=topItems.slice(0,3).map(i=>`  ${i.emoji} ${i.name} (${i.qty}x)`).join("\n");
    return `☕ *HAKKA KOPITIAM*\n*Daily Report — ${todayStr()}*\n\n💰 Revenue: ${rm(totalRev)}\n🧾 Orders: ${totalOrds}\n👥 Total Pax: ${totalPax}\n📈 Avg Bill: ${rm(avgBill)}\n\n🏆 *Top Items:*\n${top3||"  No data"}\n\n_Generated by Hakka Kopitiam POS_`;
  }
  function shareWhatsApp(){
    const text=encodeURIComponent(buildReport());
    window.open("https://wa.me/?text="+text,"_blank");
  }

  const RANGES=[{k:"today",l:"Today"},{k:"week",l:"7 Days"},{k:"month",l:"30 Days"},{k:"all",l:"All Time"}];
  const TABS=[{k:"overview",l:"Overview"},{k:"items",l:"Items"},{k:"hours",l:"Hours"},{k:"report",l:"Report"}];

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      {/* Header */}
      <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"13px 18px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={onBack} style={{background:"none",border:`1px solid ${C.bdr}`,color:C.dim,padding:"7px 12px",borderRadius:9,cursor:"pointer",fontSize:13}}>←</button>
            <div style={{fontWeight:"bold",color:C.purple,fontSize:15}}>📊 Analytics</div>
          </div>
          <button onClick={load} style={{background:"none",border:`1px solid ${C.bdr}`,color:C.dim,padding:"6px 12px",borderRadius:8,cursor:"pointer",fontSize:12}}>↻</button>
        </div>
        <div style={{display:"flex",gap:6}}>
          {RANGES.map(r=>(
            <button key={r.k} onClick={()=>setRange(r.k)} style={{flex:1,padding:"7px 0",borderRadius:9,border:`1px solid ${range===r.k?C.purple:C.bdr}`,background:range===r.k?C.purple+"33":"none",color:range===r.k?C.purple:C.dim,fontSize:11,cursor:"pointer",fontWeight:range===r.k?"bold":"normal"}}>{r.l}</button>
          ))}
        </div>
      </div>

      {loading?(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
          <div style={{fontSize:30}}>📊</div><div style={{color:C.dim,fontSize:13}}>Loading…</div>
        </div>
      ):error?(
        <div style={{flex:1,padding:"24px 20px"}}>
          <div style={{background:"#2a0a0a",border:`1px solid ${C.red}`,borderRadius:12,padding:"16px"}}>
            <div style={{fontSize:14,color:C.red,fontWeight:"bold",marginBottom:8}}>⚠ Could not load data</div>
            <div style={{fontSize:12,color:"#cc8888",wordBreak:"break-all",marginBottom:12}}>{error}</div>
            <div style={{fontSize:12,color:C.dim,lineHeight:1.8,marginBottom:12}}>Fix: Supabase → Table Editor → orders → Disable RLS</div>
            <button onClick={load} style={{background:C.purple,border:"none",color:"#fff",padding:"10px 20px",borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:"bold"}}>Try Again</button>
          </div>
        </div>
      ):(
        <>
          {/* Tab bar */}
          <div style={{background:C.surf,borderBottom:`1px solid ${C.bdr}`,padding:"0 16px",display:"flex",gap:0,flexShrink:0}}>
            {TABS.map(t=>(
              <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:"12px 0",border:"none",borderBottom:`2px solid ${tab===t.k?C.gold:"transparent"}`,background:"none",color:tab===t.k?C.gold:C.dim,fontSize:12,cursor:"pointer",fontWeight:tab===t.k?"bold":"normal",transition:"all 0.15s"}}>{t.l}</button>
            ))}
          </div>

          <div style={{flex:1,overflowY:"auto",padding:"16px 16px 32px"}}>

            {/* ── OVERVIEW ── */}
            {tab==="overview"&&(
              <div>
                {/* KPI grid */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {[{l:"Total Revenue",v:rm(totalRev),c:C.green,i:"💰"},{l:"Orders",v:totalOrds,c:C.gold,i:"🧾"},{l:"Total Pax",v:totalPax,c:C.blue,i:"👥"},{l:"Avg Bill",v:rm(avgBill),c:C.purple,i:"📈"}].map(s=>(
                    <div key={s.l} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"16px"}}>
                      <div style={{fontSize:22,marginBottom:6}}>{s.i}</div>
                      <div style={{fontSize:20,fontWeight:"bold",color:s.c}}>{s.v}</div>
                      <div style={{fontSize:10,color:C.dim,marginTop:3,letterSpacing:0.5}}>{s.l}</div>
                    </div>
                  ))}
                </div>

                {totalOrds>0&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                    <div style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"14px"}}>
                      <div style={{fontSize:10,color:C.dim,marginBottom:6}}>AVG PAX / VISIT</div>
                      <div style={{fontSize:22,fontWeight:"bold",color:C.txt}}>{avgPax.toFixed(1)}</div>
                    </div>
                    <div style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"14px"}}>
                      <div style={{fontSize:10,color:C.dim,marginBottom:6}}>AVG PER PAX</div>
                      <div style={{fontSize:22,fontWeight:"bold",color:C.txt}}>{totalPax>0?rm(totalRev/totalPax):"—"}</div>
                    </div>
                  </div>
                )}

                {/* Day of week bar chart */}
                {totalOrds>0&&(
                  <div style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"16px",marginBottom:16}}>
                    <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:14}}>REVENUE BY DAY OF WEEK</div>
                    <div style={{display:"flex",gap:6,alignItems:"flex-end",height:80}}>
                      {dayStats.map(d=>{
                        const pct=maxDayRev>0?(d.rev/maxDayRev*100):0;
                        const today=DAYS[new Date().getDay()]===d.day;
                        return(
                          <div key={d.day} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                            <div style={{fontSize:9,color:d.rev>0?C.gold:C.faint}}>{d.rev>0?rm(d.rev).replace("RM",""):""}</div>
                            <div style={{width:"100%",background:today?C.gold:C.purple,opacity:pct>0?0.3+pct/100*0.7:0.1,borderRadius:"4px 4px 0 0",height:Math.max(4,pct*0.65)+"px",transition:"height 0.3s"}}/>
                            <div style={{fontSize:10,color:today?C.gold:C.dim,fontWeight:today?"bold":"normal"}}>{d.day}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Category revenue */}
                {catStats.length>0&&(
                  <div style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"16px",marginBottom:16}}>
                    <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:12}}>REVENUE BY CATEGORY</div>
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {catStats.map(c=>{
                        const pct=maxCatRev>0?(c.rev/maxCatRev*100):0;
                        return(
                          <div key={c.cat}>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:5}}>
                              <span style={{color:C.txt}}>{c.cat}</span>
                              <span style={{color:C.gold}}>{rm(c.rev)}</span>
                            </div>
                            <div style={{height:6,background:C.bdrHi,borderRadius:3,overflow:"hidden"}}>
                              <div style={{height:"100%",width:pct+"%",background:`linear-gradient(90deg,${C.purple},${C.gold})`,borderRadius:3,transition:"width 0.4s"}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Recent orders */}
                <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:10}}>RECENT ORDERS</div>
                {orders.length===0&&<div style={{color:C.faint,fontSize:13,textAlign:"center",padding:"20px 0"}}>No orders for this period</div>}
                {orders.slice(0,10).map(o=>(
                  <div key={o.id} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"11px 14px",marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:"bold",color:C.gold}}>Table {o.table_ids}</div>
                        <div style={{fontSize:11,color:C.dim,marginTop:2}}>👤 {o.pax} pax · {(o.items||[]).length} items</div>
                        <div style={{fontSize:10,color:C.faint,marginTop:2}}>{new Date(o.created_at).toLocaleString("en-MY",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
                      </div>
                      <div style={{fontSize:16,fontWeight:"bold",color:C.green}}>{rm(o.total)}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ── ITEMS TAB ── */}
            {tab==="items"&&(
              <div>
                {topItems.length===0&&<div style={{color:C.faint,fontSize:13,textAlign:"center",padding:"40px 0"}}>No item data yet</div>}

                {topItems.length>0&&(
                  <>
                    <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:10}}>🏆 BEST SELLERS</div>
                    {topItems.slice(0,10).map((it,i)=>{
                      const pct=topItems[0].qty>0?(it.qty/topItems[0].qty*100):0;
                      return(
                        <div key={it.name} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"11px 14px",marginBottom:8}}>
                          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                            <div style={{fontSize:11,color:C.faint,minWidth:20,textAlign:"center",fontWeight:"bold"}}>#{i+1}</div>
                            <div style={{fontSize:20}}>{it.emoji}</div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,color:C.txt}}>{it.name}</div>
                              <div style={{fontSize:10,color:C.dim}}>{it.cat}</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontSize:14,fontWeight:"bold",color:C.gold}}>{it.qty}×</div>
                              <div style={{fontSize:11,color:C.green}}>{rm(it.rev)}</div>
                            </div>
                          </div>
                          <div style={{height:4,background:C.bdrHi,borderRadius:2,overflow:"hidden"}}>
                            <div style={{height:"100%",width:pct+"%",background:i<3?C.gold:C.purple,borderRadius:2,transition:"width 0.4s"}}/>
                          </div>
                        </div>
                      );
                    })}

                    {bottomItems.length>0&&topItems.length>5&&(
                      <>
                        <div style={{fontSize:11,color:C.dim,letterSpacing:1,margin:"20px 0 10px"}}>⚠️ SLOW MOVERS</div>
                        {bottomItems.map((it,i)=>(
                          <div key={it.name} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"11px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                            <div style={{fontSize:20}}>{it.emoji}</div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,color:C.dim}}>{it.name}</div>
                              <div style={{fontSize:10,color:C.faint}}>{it.cat}</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontSize:14,fontWeight:"bold",color:C.dim}}>{it.qty}×</div>
                              <div style={{fontSize:11,color:C.dim}}>{rm(it.rev)}</div>
                            </div>
                          </div>
                        ))}
                      </>
                    )}
                  </>
                )}
              </div>
            )}

            {/* ── HOURS TAB ── */}
            {tab==="hours"&&(
              <div>
                <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:14}}>PEAK HOURS HEATMAP</div>
                {totalOrds===0?<div style={{color:C.faint,fontSize:13,textAlign:"center",padding:"40px 0"}}>No data yet</div>:(
                  <div style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"16px",marginBottom:16}}>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {hourStats.map(h=>{
                        const pct=maxHour>0?(h.count/maxHour*100):0;
                        const heat=pct>75?C.red:pct>40?C.orange:pct>15?C.gold:C.bdrHi;
                        const label=h.hour<12?`${h.hour}am`:h.hour===12?"12pm":`${h.hour-12}pm`;
                        return(
                          <div key={h.hour} style={{display:"flex",alignItems:"center",gap:10}}>
                            <div style={{fontSize:11,color:C.dim,width:36,textAlign:"right",flexShrink:0}}>{label}</div>
                            <div style={{flex:1,height:22,background:C.bdrHi,borderRadius:4,overflow:"hidden",position:"relative"}}>
                              <div style={{height:"100%",width:pct+"%",background:heat,borderRadius:4,transition:"width 0.4s",opacity:0.85}}/>
                            </div>
                            <div style={{fontSize:11,color:pct>0?C.txt:C.faint,width:30,textAlign:"left",flexShrink:0}}>{h.count>0?h.count+"x":""}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
                      {[{c:C.red,l:"Very busy"},{c:C.orange,l:"Busy"},{c:C.gold,l:"Moderate"},{c:C.bdrHi,l:"Quiet"}].map(x=>(
                        <div key={x.l} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:C.dim}}>
                          <div style={{width:12,height:12,borderRadius:2,background:x.c}}/>{x.l}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Table stats */}
                {totalOrds>0&&(
                  <>
                    <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:10,marginTop:8}}>BY TABLE</div>
                    {Object.entries(orders.reduce((m,o)=>{
                      const k=o.table_ids||"?";
                      if(!m[k])m[k]={table:k,visits:0,pax:0,rev:0};
                      m[k].visits++;m[k].pax+=o.pax||0;m[k].rev+=o.total||0;
                      return m;
                    },{})).sort(([,a],[,b])=>b.rev-a.rev).map(([k,t])=>(
                      <div key={k} style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"11px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:"bold",color:C.gold}}>Table {t.table}</div>
                          <div style={{fontSize:11,color:C.dim,marginTop:2}}>{t.visits} visit{t.visits>1?"s":""} · {t.pax} pax</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:16,fontWeight:"bold",color:C.green}}>{rm(t.rev)}</div>
                          <div style={{fontSize:10,color:C.dim}}>{rm(t.rev/t.visits)}/visit</div>
                        </div>
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}

            {/* ── REPORT TAB ── */}
            {tab==="report"&&(
              <div>
                <div style={{background:C.surfUp,border:`1px solid ${C.bdr}`,borderRadius:12,padding:"18px",marginBottom:16}}>
                  <div style={{fontSize:11,color:C.dim,letterSpacing:1,marginBottom:14}}>END OF DAY REPORT</div>
                  <div style={{background:C.bg,borderRadius:10,padding:"16px",fontFamily:"'Courier New',monospace",fontSize:12,color:C.txt,lineHeight:2,whiteSpace:"pre-wrap"}}>
{`☕ HAKKA KOPITIAM
${todayStr()}
${"─".repeat(28)}
💰 Revenue    : ${rm(totalRev)}
🧾 Orders     : ${totalOrds}
👥 Total Pax  : ${totalPax}
📈 Avg Bill   : ${rm(avgBill)}
👤 Avg Pax    : ${avgPax.toFixed(1)}
${"─".repeat(28)}
🏆 TOP ITEMS
${topItems.slice(0,5).map((it,i)=>`${i+1}. ${it.emoji} ${it.name}\n   ${it.qty}x ordered · ${rm(it.rev)}`).join("\n")||"  No data"}
${"─".repeat(28)}
📂 BY CATEGORY
${catStats.map(c=>`${c.cat}: ${rm(c.rev)}`).join("\n")||"  No data"}`}
                  </div>
                </div>

                <button onClick={shareWhatsApp} style={{width:"100%",padding:"16px",background:"#25d366",border:"none",color:"#fff",borderRadius:12,cursor:"pointer",fontSize:15,fontWeight:"bold",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:12}}>
                  <span style={{fontSize:20}}>📱</span> Share via WhatsApp
                </button>

                <div style={{background:"#0e1828",border:`1px solid ${C.blue}33`,borderRadius:12,padding:"16px",marginTop:8}}>
                  <div style={{fontSize:12,color:C.blue,fontWeight:"bold",marginBottom:8}}>📡 Multi-Device Sync — Premium Feature</div>
                  <div style={{fontSize:11,color:C.dim,lineHeight:1.8,marginBottom:10}}>
                    Want your kitchen, counter, and floor staff all on separate devices seeing live orders in real time? Multi-device sync keeps every tablet and phone in sync instantly.
                  </div>
                  <div style={{fontSize:11,color:C.dim,lineHeight:1.8}}>
                    ✓ Live floor map across all devices<br/>
                    ✓ Orders placed on one device visible on all<br/>
                    ✓ Manager can monitor remotely from home<br/>
                    ✓ Kitchen display screen support
                  </div>
                  <div style={{marginTop:12,padding:"10px 14px",background:C.surfUp,borderRadius:8,fontSize:11,color:C.gold,textAlign:"center"}}>
                    Contact us to upgrade → multi-device plan
                  </div>
                </div>
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
