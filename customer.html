async function submitOrder(payload) {
  const r = await fetch(SUPA_URL+"/rest/v1/customer_orders",{
    method:"POST",
    headers:{...HDR,"Prefer":"return=minimal"},
    body:JSON.stringify(payload),
  });
  if(!r.ok) throw new Error("HTTP "+r.status+": "+await r.text());
}

async function fetchMenu() {
  const r = await fetch(SUPA_URL+"/rest/v1/menu_items?select=*&order=sort_order.asc,created_at.asc",{headers:HDR});
  if(!r.ok) return null;
  return r.json();
}

// ── HELPERS ───────────────────────────────────────────────
const hasV = i => i.v && i.v.length > 0;
const rm   = n => "RM"+(+(n||0)).toFixed(2);

function defSel(item){const s={};(item.v||[]).forEach(vg=>{s[vg.key]=0;});return s;}
function iPrice(item,sel){
  let base=item.price||0;
  (item.v||[]).forEach(vg=>{
    const opt=vg.options[(sel&&sel[vg.key])||0];
    if(!opt)return;
    if(opt.base!==undefined)base=opt.base;else base+=opt.mod||0;
  });
  return base;
}
function iLabel(item,sel){
  return(item.v||[]).map(vg=>{
    const opt=vg.options[(sel&&sel[vg.key])||0];
    return opt?opt.label.replace(/ \(\+RM\d+\)/,""):"";
  }).filter(Boolean).join(" · ");
}
function cartTotal(cart){return cart.reduce((s,ci)=>s+iPrice(ci.item,ci.sel)*ci.qty,0);}
function cartCount(cart){return cart.reduce((s,ci)=>s+ci.qty,0);}

// get table from URL ?table=L1
function getTableId(){
  const p = new URLSearchParams(window.location.search);
  return p.get("table")||p.get("t")||"?";
}

  bg:"#faf6f0", card:"#ffffff", surf:"#fff8f0",

// ── APP ───────────────────────────────────────────────────
function App(){
  const tableId = getTableId();

  const [cats,  setCats]  = useState(Object.keys(DEFAULT_MENU));
  const [cat,   setCat]   = useState(Object.keys(DEFAULT_MENU)[0]);
  const [cart,  setCart]  = useState([]); // [{id, item, sel, qty}]
  const [view,  setView]  = useState("menu"); // menu | cart | confirm | done
  const [note,  setNote]  = useState("");
  const [sending, setSending] = useState(false);
  const [error,   setError]   = useState(null);
  const [expandedItem, setExpandedItem] = useState(null);

  // load DB menu
  useEffect(()=>{
    fetchMenu().then(data=>{
      if(data && data.length>0){
        const grouped={};
        data.filter(i=>!i.sold_out).forEach(item=>{
          const c=item.category;
          if(!grouped[c])grouped[c]=[];
          const v=item.variations?(typeof item.variations==="string"?JSON.parse(item.variations):item.variations):[];
          grouped[c].push({id:item.id,name:item.name,zh:item.name_zh||"",price:parseFloat(item.price)||0,big:item.price_big?parseFloat(item.price_big):null,disp:item.price_display||null,emoji:item.emoji||"☕",v,sold_out:false});
        });
        if(Object.keys(grouped).length>0){
          setMENU(grouped);
          setCats(Object.keys(grouped));
          setCat(Object.keys(grouped)[0]);
        }
      }
    }).catch(()=>{});
  },[]);

  // cart helpers
  function addToCart(item, sel){
    setCart(prev=>{
      // if same item + same sel exists, increment
      const key = item.id+"_"+JSON.stringify(sel);
      const existing = prev.find(ci=>ci.id===key);
      if(existing) return prev.map(ci=>ci.id===key?{...ci,qty:ci.qty+1}:ci);
      return [...prev,{id:key,item,sel,qty:1}];
    });
  }
  function removeFromCart(cartId){
    setCart(prev=>{
      const ci=prev.find(c=>c.id===cartId);
      if(!ci)return prev;
      if(ci.qty<=1)return prev.filter(c=>c.id!==cartId);
      return prev.map(c=>c.id===cartId?{...c,qty:c.qty-1}:c);
    });
  }
  function getQty(item,sel){
    const key=item.id+"_"+JSON.stringify(sel);
    return cart.find(c=>c.id===key)?.qty||0;
  }

  async function sendOrder(){
    if(cart.length===0)return;
    setSending(true);setError(null);
    const items=cart.map(ci=>({
      name:ci.item.name,zh:ci.item.zh,emoji:ci.item.emoji,
      price:iPrice(ci.item,ci.sel),qty:ci.qty,
      custom:iLabel(ci.item,ci.sel)||null,
    }));
    const total=cartTotal(cart);
    try{
      await submitOrder({table_id:tableId,items,total:+total.toFixed(2),note:note.trim()||null,status:"pending"});
      setView("done");
    }catch(e){
      setError("Could not send order. Please ask a staff member.");
    }
    setSending(false);
  }

  const count=cartCount(cart);
  const total=cartTotal(cart);

  if(tableId==="?") return <NoTable/>;

  return(
    <div style={{minHeight:"100dvh",background:K.bg,color:K.txt,fontFamily:"Georgia,'Times New Roman',serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>

      {view==="done" && <DoneView tableId={tableId} onNewOrder={()=>{setCart([]);setNote("");setView("menu");}}/>}
      {view==="confirm" && (
        <ConfirmView cart={cart} total={total} tableId={tableId} note={note} setNote={setNote}
          sending={sending} error={error}
          onSend={sendOrder} onBack={()=>setView("cart")}/>
      )}
      {view==="cart" && (
        <CartView cart={cart} total={total} tableId={tableId}
          onAdd={(cartId)=>{
            const ci=cart.find(c=>c.id===cartId);
            if(ci)addToCart(ci.item,ci.sel);
          }}
          onRemove={removeFromCart}
          onBack={()=>setView("menu")}
          onCheckout={()=>setView("confirm")}/>
      )}
      {view==="menu" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
          {/* Header */}
          <div style={{background:K.brown,padding:"20px 18px 16px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,opacity:0.06,background:"repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%)",backgroundSize:"10px 10px"}}/>
            <div style={{position:"relative"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:9,color:"#d4b896",letterSpacing:3,marginBottom:4}}>WELCOME TO</div>
                  <div style={{fontSize:20,fontWeight:"bold",color:"#fff",letterSpacing:1}}>Hakka Kopitiam</div>
                  <div style={{fontSize:11,color:"#d4b896",marginTop:2}}>家的味道 · Taman Gembira</div>
                </div>
                <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 14px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#d4b896",letterSpacing:1}}>TABLE</div>
                  <div style={{fontSize:22,fontWeight:"bold",color:"#fff",lineHeight:1}}>{tableId}</div>
                </div>
              </div>
              <div style={{marginTop:14,fontSize:11,color:"#d4b896"}}>Browse the menu and tap + to add items 🍜</div>
            </div>
          </div>

          {/* Category tabs */}
          <div style={{background:K.card,borderBottom:`1px solid ${K.bdr}`,padding:"0 16px"}}>
            <div style={{display:"flex",gap:0,overflowX:"auto",paddingBottom:0}}>
              {cats.map(c=>(
                <button key={c} onClick={()=>setCat(c)} style={{flexShrink:0,padding:"13px 14px",border:"none",borderBottom:`3px solid ${cat===c?K.gold:"transparent"}`,background:"none",color:cat===c?K.goldDk:K.dim,fontSize:12,cursor:"pointer",fontWeight:cat===c?"bold":"normal",whiteSpace:"nowrap",transition:"all 0.15s"}}>
                  {c}
                </button>
              ))}
            </div>
          </div>

          {/* Menu items */}
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px 120px"}}>
            {cat==="🍜 Noodles"&&(
              <div style={{background:"#fffbf0",border:`1px solid ${K.bdr}`,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:11,color:K.dim,lineHeight:1.8}}>
                🍜 <strong style={{color:K.goldDk}}>Noodle choices:</strong> Yellow · Hor Fun · Rice Vermicelli · Wanton · Lao Shu Fen · Instant · Handmade (+RM1)
              </div>
            )}
            {cat==="📅 Daily"&&(
              <div style={{background:"#fffbf0",border:`1px solid ${K.bdr}`,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:11,color:K.dim}}>
                🍚 All daily specials come with your choice of <strong style={{color:K.goldDk}}>Rice or Noodles</strong>
              </div>
            )}

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {(MENU[cat]||[]).filter(item=>!item.sold_out).map(item=>{
                const isExpanded = expandedItem===item.id;
                const priceStr = item.disp||(item.big?`${rm(item.price)} – ${rm(item.big)}`:rm(item.price));
                const simpleQty = !hasV(item)?getQty(item,{}):0;

                return(
                  <div key={item.id} style={{background:K.card,border:`1px solid ${K.bdr}`,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                    {/* Item row */}
                    <div style={{display:"flex",alignItems:"center",padding:"14px 14px",gap:12}}>
                      <div style={{fontSize:32,flexShrink:0,width:44,textAlign:"center"}}>{item.emoji}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,color:K.txt,fontWeight:"600",lineHeight:1.3}}>{item.name}</div>
                        <div style={{fontSize:11,color:K.faint,marginTop:2}}>{item.zh}</div>
                        <div style={{fontSize:14,color:K.goldDk,fontWeight:"bold",marginTop:4}}>{priceStr}</div>
                      </div>
                      {/* Controls */}
                      {!hasV(item)?(
                        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                          {simpleQty>0&&(
                            <button onClick={()=>removeFromCart(item.id+"_"+JSON.stringify({}))} style={{width:32,height:32,borderRadius:"50%",border:`1.5px solid ${K.bdr}`,background:K.bg,color:K.txt,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                          )}
                          {simpleQty>0&&<span style={{fontSize:15,fontWeight:"bold",color:K.green,minWidth:16,textAlign:"center"}}>{simpleQty}</span>}
                          <button onClick={()=>addToCart(item,{})} style={{width:36,height:36,borderRadius:"50%",border:"none",background:K.gold,color:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",boxShadow:`0 2px 8px ${K.gold}55`}}>+</button>
                        </div>
                      ):(
                        <button onClick={()=>setExpandedItem(isExpanded?null:item.id)} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${K.gold}`,background:isExpanded?K.gold:K.bg,color:isExpanded?"#fff":K.goldDk,fontSize:12,cursor:"pointer",fontWeight:"bold",flexShrink:0,transition:"all 0.15s"}}>
                          {isExpanded?"Done":"Choose"}
                        </button>
                      )}
                    </div>

                    {/* Variation panel — expands inline */}
                    {hasV(item)&&isExpanded&&(
                      <VariationPanel item={item} onAdd={(sel)=>{addToCart(item,sel);}} cart={cart} onRemove={removeFromCart}/>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Floating cart button */}
          {count>0&&(
            <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"16px 20px 28px",background:"linear-gradient(transparent,"+K.bg+" 40%)",pointerEvents:"none"}}>
              <button onClick={()=>setView("cart")} style={{width:"100%",padding:"16px 20px",background:K.brown,border:"none",color:"#fff",borderRadius:16,cursor:"pointer",fontSize:15,fontWeight:"bold",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 4px 20px rgba(92,58,30,0.35)",pointerEvents:"all"}}>
                <div style={{background:"rgba(255,255,255,0.2)",borderRadius:8,padding:"2px 10px",fontSize:13,fontWeight:"bold"}}>{count}</div>
                <span>View Order</span>
                <span style={{fontSize:15,fontWeight:"bold"}}>{rm(total)}</span>
              </button>
            </div>
          )}

}

// ── VARIATION PANEL ───────────────────────────────────────
function VariationPanel({item,onAdd,cart,onRemove}){
  const [sel,setSel]=useState(()=>{
    const s={};(item.v||[]).forEach(vg=>{s[vg.key]=0;});return s;
  });

  function setV(k,i){setSel(s=>({...s,[k]:i}));}
  function price(){
    let base=item.price||0;
    (item.v||[]).forEach(vg=>{
      const opt=vg.options[(sel&&sel[vg.key])||0];
      if(!opt)return;
      if(opt.base!==undefined)base=opt.base;else base+=opt.mod||0;
    });
    return base;
  }
  const label=(item.v||[]).map(vg=>{const opt=vg.options[sel[vg.key]||0];return opt?opt.label.replace(/ \(\+RM\d+\)/,""):"";}).filter(Boolean).join(" · ");
  const key=item.id+"_"+JSON.stringify(sel);
  const qty=cart.find(c=>c.id===key)?.qty||0;

  return(
    <div style={{borderTop:`1px solid ${K.bdr}`,background:"#fffcf8",padding:"14px 16px"}}>
      {(item.v||[]).map(vg=>(
        <div key={vg.key} style={{marginBottom:12}}>
          <div style={{fontSize:11,color:K.dim,fontWeight:"bold",marginBottom:7,letterSpacing:0.5}}>{vg.label.toUpperCase()}</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {vg.options.map((opt,oIdx)=>{
              const s=(sel[vg.key]||0)===oIdx;
              return(
                <button key={oIdx} onClick={()=>setV(vg.key,oIdx)} style={{padding:"7px 14px",borderRadius:20,border:`1.5px solid ${s?K.gold:K.bdr}`,background:s?K.gold:"#fff",color:s?"#fff":K.dim,fontSize:12,cursor:"pointer",fontWeight:s?"bold":"normal",transition:"all 0.12s"}}>
                  {opt.label}
                </button>
              );
            })}
          </div>
        </div>
      ))}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
        <div style={{fontSize:13,color:K.goldDk,fontWeight:"bold"}}>{rm(price())} · {label}</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {qty>0&&<button onClick={()=>onRemove(key)} style={{width:32,height:32,borderRadius:"50%",border:`1.5px solid ${K.bdr}`,background:"#fff",color:K.txt,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>}
          {qty>0&&<span style={{fontSize:15,fontWeight:"bold",color:K.green,minWidth:16,textAlign:"center"}}>{qty}</span>}
          <button onClick={()=>onAdd(sel)} style={{width:36,height:36,borderRadius:"50%",border:"none",background:K.gold,color:"#fff",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",boxShadow:`0 2px 8px ${K.gold}55`}}>+</button>
        </div>
      </div>
    </div>
  );
}

// ── CART VIEW ─────────────────────────────────────────────
function CartView({cart,total,tableId,onAdd,onRemove,onBack,onCheckout}){
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div style={{background:K.brown,padding:"16px 18px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <div style={{fontWeight:"bold",color:"#fff",fontSize:16}}>Your Order</div>
          <div style={{fontSize:11,color:"#d4b896"}}>Table {tableId}</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 16px 20px"}}>
        {cart.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:K.faint}}>
            <div style={{fontSize:40,marginBottom:12}}>🛒</div>
            <div style={{fontSize:14}}>Your order is empty</div>
          </div>
        ):cart.map(ci=>{
          const lbl=iLabel(ci.item,ci.sel);
          return(
            <div key={ci.id} style={{background:K.card,border:`1px solid ${K.bdr}`,borderRadius:12,padding:"14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:26,flexShrink:0}}>{ci.item.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:K.txt,fontWeight:"600"}}>{ci.item.name}</div>
                {lbl&&<div style={{fontSize:11,color:K.dim,marginTop:2}}>↳ {lbl}</div>}
                <div style={{fontSize:13,color:K.goldDk,fontWeight:"bold",marginTop:3}}>{rm(iPrice(ci.item,ci.sel))} each</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <button onClick={()=>onRemove(ci.id)} style={{width:30,height:30,borderRadius:"50%",border:`1.5px solid ${K.bdr}`,background:K.bg,color:K.txt,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <span style={{fontSize:15,fontWeight:"bold",color:K.green,minWidth:20,textAlign:"center"}}>{ci.qty}</span>
                <button onClick={()=>onAdd(ci.id)} style={{width:30,height:30,borderRadius:"50%",border:"none",background:K.gold,color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>+</button>
              </div>
            </div>
          );
        })}
      </div>

      {cart.length>0&&(
        <div style={{padding:"16px 18px 32px",background:K.card,borderTop:`1px solid ${K.bdr}`}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:"bold",marginBottom:14}}>
            <span style={{color:K.txt}}>Total</span>
            <span style={{color:K.goldDk}}>{rm(total)}</span>
          </div>
          <button onClick={onCheckout} style={{width:"100%",padding:"16px",background:K.brown,border:"none",color:"#fff",borderRadius:14,cursor:"pointer",fontSize:15,fontWeight:"bold",boxShadow:"0 4px 16px rgba(92,58,30,0.3)"}}>
            Review & Send Order →
          </button>
        </div>
      )}
    </div>
  );
}

// ── CONFIRM VIEW ──────────────────────────────────────────
function ConfirmView({cart,total,tableId,note,setNote,sending,error,onSend,onBack}){
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
      <div style={{background:K.brown,padding:"16px 18px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <div>
          <div style={{fontWeight:"bold",color:"#fff",fontSize:16}}>Confirm Order</div>
          <div style={{fontSize:11,color:"#d4b896"}}>Table {tableId}</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px 18px 20px"}}>
        {/* Order summary */}
        <div style={{background:K.card,border:`1px solid ${K.bdr}`,borderRadius:14,padding:"16px",marginBottom:16}}>
          <div style={{fontSize:11,color:K.dim,letterSpacing:1,marginBottom:12}}>ORDER SUMMARY</div>
          {cart.map(ci=>{
            const lbl=iLabel(ci.item,ci.sel);
            return(
              <div key={ci.id} style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <span style={{fontSize:13,color:K.txt}}>{ci.item.emoji} {ci.item.name}</span>
                  {lbl&&<div style={{fontSize:11,color:K.dim,marginTop:1}}>↳ {lbl}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                  <div style={{fontSize:12,color:K.dim}}>×{ci.qty}</div>
                  <div style={{fontSize:13,color:K.goldDk,fontWeight:"bold"}}>{rm(iPrice(ci.item,ci.sel)*ci.qty)}</div>
                </div>
              </div>
            );
          })}
          <div style={{borderTop:`1px dashed ${K.bdr}`,marginTop:8,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontWeight:"bold",color:K.txt,fontSize:15}}>Total</span>
            <span style={{fontWeight:"bold",color:K.goldDk,fontSize:16}}>{rm(total)}</span>
          </div>
        </div>

        {/* Note */}
        <div style={{background:K.card,border:`1px solid ${K.bdr}`,borderRadius:14,padding:"16px",marginBottom:16}}>
          <div style={{fontSize:11,color:K.dim,letterSpacing:1,marginBottom:8}}>SPECIAL REQUEST <span style={{color:K.faint}}>(optional)</span></div>
          <textarea
            value={note}
            onChange={e=>setNote(e.target.value.slice(0,60))}
            placeholder="e.g. less sugar, no ice, extra spicy..."
            rows={2}
            style={{width:"100%",padding:"10px 12px",background:K.bg,border:`1px solid ${K.bdr}`,borderRadius:10,color:K.txt,fontSize:13,outline:"none",resize:"none",boxSizing:"border-box",lineHeight:1.6}}
          />
          <div style={{textAlign:"right",fontSize:10,color:K.faint,marginTop:4}}>{note.length}/60</div>
        </div>

        {error&&(
          <div style={{background:"#fff0f0",border:`1px solid ${K.red}`,borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:13,color:K.red,textAlign:"center"}}>
            {error}
          </div>
        )}

        <div style={{background:"#fffbf0",border:`1px solid ${K.bdr}`,borderRadius:12,padding:"12px 14px",fontSize:12,color:K.dim,lineHeight:1.8,marginBottom:8}}>
          ℹ️ Your order will be sent to our staff. Payment is collected at the end of your visit.
        </div>
      </div>

      <div style={{padding:"14px 18px 32px",background:K.card,borderTop:`1px solid ${K.bdr}`}}>
        <button onClick={onSend} disabled={sending} style={{width:"100%",padding:"16px",background:sending?"#c4a882":K.green,border:"none",color:"#fff",borderRadius:14,cursor:sending?"not-allowed":"pointer",fontSize:15,fontWeight:"bold",boxShadow:sending?"none":"0 4px 16px rgba(45,122,74,0.3)"}}>
          {sending?"Sending order…":"✓ Send Order to Kitchen"}
        </button>
      </div>
    </div>
  );
}

// ── DONE VIEW ─────────────────────────────────────────────
function DoneView({tableId,onNewOrder}){
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 32px",textAlign:"center",background:K.bg}}>
      <div style={{fontSize:72,marginBottom:20,animation:"bounce 1s"}}>✅</div>
      <div style={{fontSize:24,fontWeight:"bold",color:K.green,marginBottom:8}}>Order Sent!</div>
      <div style={{fontSize:15,color:K.txt,marginBottom:6}}>Thank you!</div>
      <div style={{fontSize:13,color:K.dim,marginBottom:32,lineHeight:1.8}}>
        Your order has been sent to our staff.<br/>
        We'll serve you shortly at <strong>Table {tableId}</strong>.
      </div>
      <div style={{background:K.card,border:`1px solid ${K.bdr}`,borderRadius:16,padding:"20px 24px",marginBottom:32,width:"100%",maxWidth:300}}>
        <div style={{fontSize:22,marginBottom:8}}>☕</div>
        <div style={{fontSize:14,fontWeight:"bold",color:K.brown,marginBottom:4}}>Hakka Kopitiam</div>
        <div style={{fontSize:12,color:K.dim}}>家的味道 · Taman Gembira, KL</div>
      </div>
      <button onClick={onNewOrder} style={{padding:"14px 32px",background:"none",border:`2px solid ${K.gold}`,color:K.goldDk,borderRadius:30,cursor:"pointer",fontSize:14,fontWeight:"bold"}}>
        + Add More Items
      </button>
    </div>
  );
}

// ── NO TABLE ──────────────────────────────────────────────
function NoTable(){
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 32px",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>🪑</div>
      <div style={{fontSize:18,fontWeight:"bold",color:K.txt,marginBottom:8}}>No Table Selected</div>
      <div style={{fontSize:13,color:K.dim,lineHeight:1.8}}>Please scan the QR code on your table to place an order.</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
